<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep dark background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07060f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d0b1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06050e;stop-opacity:1" />
    </linearGradient>

    <!-- Lavender glow gradient for "Mesh." -->
    <linearGradient id="meshGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>

    <!-- Subtle white gradient for "Mind" -->
    <linearGradient id="mindGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d1d5db;stop-opacity:1" />
    </linearGradient>

    <!-- Radial glow behind title -->
    <radialGradient id="glowCenter" cx="50%" cy="55%" r="40%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#07060f;stop-opacity:0" />
    </radialGradient>

    <!-- Mesh node glow -->
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0" />
    </radialGradient>

    <!-- Filter: purple drop shadow / glow for Mesh text -->
    <filter id="meshGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur" />
      <feFlood flood-color="#a855f7" flood-opacity="0.7" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="shadow" />
      <feMerge>
        <feMergeNode in="shadow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Filter: subtle white glow for Mind text -->
    <filter id="mindGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur" />
      <feFlood flood-color="#ffffff" flood-opacity="0.4" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="shadow" />
      <feMerge>
        <feMergeNode in="shadow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Clip path for contained animations -->
    <clipPath id="bannerClip">
      <rect width="1200" height="400" />
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" />

  <!-- Central glow blob -->
  <ellipse cx="600" cy="210" rx="500" ry="220" fill="url(#glowCenter)" />

  <!-- ============ ANIMATED MESH NETWORK ============ -->
  <g clip-path="url(#bannerClip)" opacity="0.55">

    <!-- Static mesh lines - left region -->
    <line x1="60" y1="80" x2="180" y2="140" stroke="#7c3aed" stroke-width="0.8" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.7;0.4" dur="4s" repeatCount="indefinite" />
    </line>
    <line x1="180" y1="140" x2="120" y2="270" stroke="#7c3aed" stroke-width="0.8" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="5s" begin="0.5s" repeatCount="indefinite" />
    </line>
    <line x1="120" y1="270" x2="40" y2="330" stroke="#a855f7" stroke-width="0.8" opacity="0.35">
      <animate attributeName="opacity" values="0.35;0.65;0.35" dur="3.5s" begin="1s" repeatCount="indefinite" />
    </line>
    <line x1="60" y1="80" x2="120" y2="270" stroke="#6d28d9" stroke-width="0.6" opacity="0.25">
      <animate attributeName="opacity" values="0.25;0.5;0.25" dur="6s" repeatCount="indefinite" />
    </line>
    <line x1="180" y1="140" x2="280" y2="60" stroke="#7c3aed" stroke-width="0.8" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.55;0.3" dur="4.5s" begin="0.8s" repeatCount="indefinite" />
    </line>
    <line x1="40" y1="330" x2="180" y2="350" stroke="#a855f7" stroke-width="0.7" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="5s" begin="1.5s" repeatCount="indefinite" />
    </line>

    <!-- Static mesh lines - right region -->
    <line x1="1140" y1="80" x2="1020" y2="140" stroke="#7c3aed" stroke-width="0.8" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.7;0.4" dur="4s" begin="0.3s" repeatCount="indefinite" />
    </line>
    <line x1="1020" y1="140" x2="1080" y2="270" stroke="#7c3aed" stroke-width="0.8" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="5s" begin="0.7s" repeatCount="indefinite" />
    </line>
    <line x1="1080" y1="270" x2="1160" y2="330" stroke="#a855f7" stroke-width="0.8" opacity="0.35">
      <animate attributeName="opacity" values="0.35;0.65;0.35" dur="3.5s" begin="1.2s" repeatCount="indefinite" />
    </line>
    <line x1="1140" y1="80" x2="1080" y2="270" stroke="#6d28d9" stroke-width="0.6" opacity="0.25">
      <animate attributeName="opacity" values="0.25;0.5;0.25" dur="6s" begin="0.4s" repeatCount="indefinite" />
    </line>
    <line x1="1020" y1="140" x2="920" y2="60" stroke="#7c3aed" stroke-width="0.8" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.55;0.3" dur="4.5s" begin="1s" repeatCount="indefinite" />
    </line>
    <line x1="1160" y1="330" x2="1020" y2="350" stroke="#a855f7" stroke-width="0.7" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="5s" begin="2s" repeatCount="indefinite" />
    </line>

    <!-- Cross lines connecting sides -->
    <line x1="280" y1="60" x2="920" y2="60" stroke="#4c1d95" stroke-width="0.5" opacity="0.2">
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="7s" repeatCount="indefinite" />
    </line>
    <line x1="180" y1="350" x2="1020" y2="350" stroke="#4c1d95" stroke-width="0.5" opacity="0.2">
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="7s" begin="1s" repeatCount="indefinite" />
    </line>

    <!-- Animated data-pulse traveling along a line (left) -->
    <circle r="3" fill="#c084fc" opacity="0">
      <animateMotion dur="3s" repeatCount="indefinite" begin="0s">
        <mpath href="#pathLeft1" />
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" dur="3s" repeatCount="indefinite" />
    </circle>
    <path id="pathLeft1" d="M60,80 L180,140 L120,270" fill="none" />

    <!-- Animated data-pulse (right) -->
    <circle r="3" fill="#c084fc" opacity="0">
      <animateMotion dur="3.5s" repeatCount="indefinite" begin="1.2s">
        <mpath href="#pathRight1" />
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" dur="3.5s" begin="1.2s" repeatCount="indefinite" />
    </circle>
    <path id="pathRight1" d="M1140,80 L1020,140 L1080,270" fill="none" />

    <!-- Mesh nodes - left -->
    <circle cx="60" cy="80" r="4" fill="#a855f7">
      <animate attributeName="r" values="4;6;4" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="180" cy="140" r="5" fill="#c084fc">
      <animate attributeName="r" values="5;7;5" dur="4s" begin="0.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" begin="0.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="120" cy="270" r="4" fill="#a855f7">
      <animate attributeName="r" values="4;6;4" dur="3.5s" begin="1s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3.5s" begin="1s" repeatCount="indefinite" />
    </circle>
    <circle cx="40" cy="330" r="3" fill="#7c3aed">
      <animate attributeName="r" values="3;5;3" dur="5s" begin="1.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="280" cy="60" r="3.5" fill="#a855f7">
      <animate attributeName="r" values="3.5;5.5;3.5" dur="4s" begin="0.8s" repeatCount="indefinite" />
    </circle>
    <circle cx="180" cy="350" r="3" fill="#7c3aed">
      <animate attributeName="r" values="3;5;3" dur="5s" begin="2s" repeatCount="indefinite" />
    </circle>

    <!-- Mesh nodes - right (mirrored) -->
    <circle cx="1140" cy="80" r="4" fill="#a855f7">
      <animate attributeName="r" values="4;6;4" dur="3s" begin="0.3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" begin="0.3s" repeatCount="indefinite" />
    </circle>
    <circle cx="1020" cy="140" r="5" fill="#c084fc">
      <animate attributeName="r" values="5;7;5" dur="4s" begin="0.8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" begin="0.8s" repeatCount="indefinite" />
    </circle>
    <circle cx="1080" cy="270" r="4" fill="#a855f7">
      <animate attributeName="r" values="4;6;4" dur="3.5s" begin="1.3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3.5s" begin="1.3s" repeatCount="indefinite" />
    </circle>
    <circle cx="1160" cy="330" r="3" fill="#7c3aed">
      <animate attributeName="r" values="3;5;3" dur="5s" begin="1.8s" repeatCount="indefinite" />
    </circle>
    <circle cx="920" cy="60" r="3.5" fill="#a855f7">
      <animate attributeName="r" values="3.5;5.5;3.5" dur="4s" begin="1.1s" repeatCount="indefinite" />
    </circle>
    <circle cx="1020" cy="350" r="3" fill="#7c3aed">
      <animate attributeName="r" values="3;5;3" dur="5s" begin="2.3s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- ============ MAIN TITLE ============ -->
  <!-- "Mind" in white -->
  <text
    x="600" y="230"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="132"
    font-weight="700"
    font-style="italic"
    letter-spacing="-2"
    text-anchor="middle"
    fill="url(#mindGrad)"
    filter="url(#mindGlow)"
  >
    <tspan fill="url(#mindGrad)" filter="url(#mindGlow)">Mind</tspan><tspan fill="url(#meshGrad)" filter="url(#meshGlow)">Mesh.</tspan>
    <animate attributeName="opacity" values="0;1" dur="0.8s" fill="freeze" />
  </text>

  <!-- ============ TAGLINE ============ -->
  <text
    x="600" y="282"
    font-family="'Georgia', serif"
    font-size="15"
    font-weight="400"
    letter-spacing="5"
    text-anchor="middle"
    fill="#9ca3af"
    opacity="0"
  >
    THE MULTI-AGENT ADVERSARIAL REASONING ENGINE
    <animate attributeName="opacity" values="0;0;0.75" dur="1.8s" fill="freeze" />
  </text>

  <!-- ============ BOTTOM BADGE ROW ============ -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0;0.9" dur="2.5s" fill="freeze" />

    <!-- Badge: 4 Agents -->
    <rect x="340" y="320" width="120" height="30" rx="15" fill="#1a1030" stroke="#7c3aed" stroke-width="1" />
    <text x="400" y="340" font-family="'Courier New', monospace" font-size="11" text-anchor="middle" fill="#c084fc" letter-spacing="1">4 AGENTS</text>

    <!-- Badge: Adversarial -->
    <rect x="480" y="320" width="140" height="30" rx="15" fill="#1a1030" stroke="#7c3aed" stroke-width="1" />
    <text x="550" y="340" font-family="'Courier New', monospace" font-size="11" text-anchor="middle" fill="#c084fc" letter-spacing="1">ADVERSARIAL</text>

    <!-- Badge: Open Source -->
    <rect x="640" y="320" width="140" height="30" rx="15" fill="#1a1030" stroke="#7c3aed" stroke-width="1" />
    <text x="710" y="340" font-family="'Courier New', monospace" font-size="11" text-anchor="middle" fill="#c084fc" letter-spacing="1">OPEN SOURCE</text>

    <!-- Badge: MIT -->
    <rect x="800" y="320" width="80" height="30" rx="15" fill="#1a1030" stroke="#7c3aed" stroke-width="1" />
    <text x="840" y="340" font-family="'Courier New', monospace" font-size="11" text-anchor="middle" fill="#c084fc" letter-spacing="1">MIT</text>
  </g>

  <!-- ============ SCANNING LINE ANIMATION ============ -->
  <rect x="0" y="0" width="1200" height="2" fill="#a855f7" opacity="0.4">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,400;0,0" dur="6s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="6s" repeatCount="indefinite" />
  </rect>

  <!-- ============ CORNER DECORATIONS ============ -->
  <g opacity="0.5">
    <!-- Top-left corner bracket -->
    <path d="M20,20 L20,50 M20,20 L50,20" stroke="#7c3aed" stroke-width="2" fill="none" />
    <!-- Top-right corner bracket -->
    <path d="M1180,20 L1180,50 M1180,20 L1150,20" stroke="#7c3aed" stroke-width="2" fill="none" />
    <!-- Bottom-left corner bracket -->
    <path d="M20,380 L20,350 M20,380 L50,380" stroke="#7c3aed" stroke-width="2" fill="none" />
    <!-- Bottom-right corner bracket -->
    <path d="M1180,380 L1180,350 M1180,380 L1150,380" stroke="#7c3aed" stroke-width="2" fill="none" />
  </g>
</svg>
